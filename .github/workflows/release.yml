---
name: Release

"on":
  release:
    types:
      - published

jobs:
  release_to_pypi:
    name: Release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aioweenect/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.3
      - name: Search and replace version
        run: |
          VERSION="${TAG_NAME//v/}"
          sed -i "s/1\.0+versionplaceholder\.1/$VERSION/" pyproject.toml
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: eifinger/setup-rye@c694239a43768373e87d0103d7f547027a23f3c8  # v4.2.9
        with:
          enable-cache: true
      - name: Build
        run: |
          rye build
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@106e0b0b7c337fa67ed433972f777c6357f78598  # v1.13.0
